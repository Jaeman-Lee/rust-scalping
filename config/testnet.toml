[exchange]
base_url = "https://testnet.binance.vision"
ws_url = "wss://testnet.binance.vision/ws"
testnet = true

[strategy]
symbol = "BTCUSDT"
interval = "1m"
ema_short = 9
ema_long = 21
rsi_period = 14
rsi_oversold = 30.0
rsi_overbought = 70.0
bollinger_period = 20
bollinger_std = 2.0

[trading]
quantity = 0.001
max_position = 0.01
stop_loss_pct = 0.3
take_profit_pct = 0.5
max_daily_trades = 100
max_daily_loss_pct = 2.0

[logging]
level = "debug"
trade_log_path = "trades.csv"
